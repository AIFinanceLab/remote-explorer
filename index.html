<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Explorer | GitHub Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div class="container">
    <!-- Welcome View -->
    <section id="hero">
      <h1>Remote <span class="gradient-text">Explorer</span></h1>
      <p style="color: var(--text-dim)">ワークスペースをクラウドからブラウズ。設定からトークンを入力して始めてください。</p>
    </section>

    <!-- Explorer View -->
    <section id="explorer-view">
      <div class="explorer-header" id="explorer-header">
        <div class="breadcrumb" id="breadcrumb">
          <span data-path="">root</span>
        </div>
        <div id="loading-indicator" style="display: none; font-size: 0.8rem; color: var(--accent)">処理中...</div>
      </div>
      <ul class="file-list" id="file-list">
        <!-- Hierarchy will be injected here -->
      </ul>
    </section>

    <!-- Posting View -->
    <section id="posting-view">
      <h2 style="font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
        ✍️ Draft Posting Application
      </h2>
      <div id="draft-list">
        <p style="color: var(--text-dim)">ドラフトを読み込み中...</p>
      </div>
    </section>
  </div>

  <!-- File Preview Overlay -->
  <div id="preview-overlay">
    <div class="preview-header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="preview-title" id="preview-filename">ファイルプレビュー</div>
        <button id="btn-x-post" style="display: none; background: #fff; color: #000; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer;">𝕏 Post</button>
      </div>
    </div>
    <div class="preview-content">
      <div id="preview-body"></div>
    </div>
    <div class="close-preview" id="close-preview">×</div>
  </div>

  <!-- Posting Preview/Editor Overlay -->
  <div id="posting-preview-overlay">
    <div class="preview-header">
      <div class="preview-title" id="posting-filename">ドラフト投稿</div>
      <div id="close-posting-preview" style="cursor: pointer; font-size: 1.5rem; opacity: 0.6;">×</div>
    </div>
    <textarea class="post-editor" id="post-editor" spellcheck="false"></textarea>
    <div class="post-actions">
      <button class="btn-post" id="btn-final-post">𝕏 実投稿</button>
      <button class="btn-dry" id="btn-dry-post">Dry Run</button>
    </div>
  </div>


  <!-- Bottom Dock -->
  <div class="dock-container">
    <div class="dock">
      <div class="dock-item" id="dock-home" title="Home">🏠</div>
      <div class="dock-item" id="dock-files" title="Explorer">📂</div>
      <div class="dock-item" id="dock-post" title="Posting">✍️</div>
      <div class="dock-item" id="dock-settings" title="Settings">⚙️</div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>接続設定</h2>
      <div class="form-group">
        <label>GitHub Personal Access Token</label>
        <input type="password" id="input-token" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>Repository (Owner/Repo)</label>
        <input type="text" id="input-repo" placeholder="AIFinanceLab/workspace" value="AIFinanceLab/workspace">
      </div>
      <div class="form-group">
        <label>Access Password (Security)</label>
        <input type="password" id="input-password" placeholder="サイト閲覧用パスワード">
      </div>
      <div class="form-group">
        <label>Backend Server URL (for 𝕏 Post)</label>
        <input type="text" id="input-server-url" placeholder="https://xxx.trycloudflare.com">
      </div>

      <div class="modal-actions">
        <button class="btn-ghost" id="btn-settings-close">キャンセル</button>
        <button class="btn-small" id="btn-settings-save">設定を保存</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal">
      <h2>認証</h2>
      <p style="color: var(--text-dim); margin-bottom: 1rem">設定したアクセスパスワードを入力してください。</p>
      <div class="form-group">
        <input type="password" id="input-login-password" placeholder="パスワード">
      </div>
      <div class="modal-actions">
        <button class="btn-small" style="width: 100%" id="btn-login-submit">アクセス</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
