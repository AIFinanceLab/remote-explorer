# GitHub Pages デプロイメント ワークフロー
name: GitHub Pagesへデプロイ

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Node.js環境をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: 依存パッケージをインストール
        run: npm install
      - name: アプリケーションをビルド
        run: npm run build
      - name: Pagesをセットアップ
        uses: actions/configure-pages@v4
      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
